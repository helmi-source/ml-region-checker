<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Region Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200 font-mono flex items-center justify-center min-h-screen p-4">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-cyan-500/30">
        <h1 class="text-3xl font-bold text-center mb-2 text-cyan-400">Region<span class="text-pink-500">.</span>Checker</h1>
        <p class="text-center text-gray-400 text-sm mb-6">Region Checker v3.0 <span class="text-pink-400">(Live on Render)</span></p>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">ID Player</label>
                <input type="text" id="playerId" placeholder="12345678" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none text-white">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">ID Server</label>
                <input type="text" id="serverId" placeholder="1234" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none text-white">
            </div>

            <button id="checkBtn" class="w-full bg-gradient-to-r from-cyan-500 to-pink-500 hover:from-cyan-600 hover:to-pink-600 text-white font-bold py-3 px-4 rounded-lg transition duration-300 ease-in-out transform hover:scale-[1.02]">
              Check Region
            </button>
        </div>

        <div id="resultArea" class="mt-6 p-4 bg-gray-900/50 rounded-lg border border-gray-700 min-h-[100px]">
            <p class="text-xs text-gray-500 mb-2">[OUTPUT]</p>
            <div id="resultContent" class="text-sm">
                Enter your ID and Server. Click Check Region.
            </div>
        </div>
    </div>

    <script>
        const checkBtn = document.getElementById('checkBtn');
        const playerIdInput = document.getElementById('playerId');
        const serverIdInput = document.getElementById('serverId');
        const resultContent = document.getElementById('resultContent');

        // Fungsi mapping server ID ke region
        function getRegionFromServerId(serverId) {
            const id = parseInt(serverId);
            
            // Mapping berdasarkan range angka
            if (id >= 1000 && id < 2000) return "South America";
            if (id >= 2000 && id < 3000) return "Europe / Indonesia";
            if (id >= 3000 && id < 4000) return "Singapore / Philippines";
            if (id >= 4000 && id < 5000) return "Southeast Asia";
            if (id >= 5000 && id < 6000) return "Asia";
            if (id >= 6000 && id < 7000) return "Russia / Central Asia";
            if (id >= 7000 && id < 8000) return "Philippines";
            if (id >= 8000 && id < 9000) return "Japan / Korea";
            
            // Mapping berdasarkan prefix
            const serverStr = serverId.toString();
            if (serverStr.startsWith("51")) return "Europe";
            if (serverStr.startsWith("52")) return "Russia";
            if (serverStr.startsWith("53")) return "North America";
            if (serverStr.startsWith("54")) return "South America";
            if (serverStr.startsWith("55")) return "Southeast Asia";
            
            return "Unknown Region";
        }

        checkBtn.addEventListener('click', async () => {
            const playerId = playerIdInput.value.trim();
            const serverId = serverIdInput.value.trim();

            if (!playerId || !serverId) {
                resultContent.innerHTML = `<span class="text-red-400">[!] ERROR: Please enter your ID and Server!</span>`;
                return;
            }

            resultContent.innerHTML = `<span class="text-cyan-400">🔍 Finding..</span> ${playerId} (${serverId})...`;

            const backendUrl = `/cek-region?id=${playerId}&server=${serverId}`;

            try {
                const response = await fetch(backendUrl);
                const apiResult = await response.json();
                
                // Dapatkan region dari server ID
                const region = getRegionFromServerId(serverId);

                if (apiResult.success) {
                    // UDAH GA ADA CREATOR - BERES!
                    resultContent.innerHTML = `
                        <span class="text-green-400">[✔] DATA FOUND!</span><br>
                        <span class="text-gray-400">Username:</span> <span class="text-white font-bold">${apiResult.username || 'Unknown'}</span><br>
                        <span class="text-gray-400">Server ID:</span> <span class="text-cyan-300 font-bold">${serverId}</span><br>
                        <span class="text-gray-400">Region:</span> <span class="text-pink-400 font-bold">${region}</span>
                    `;
                } else {
                    // Tetap tampilkan region meskipun data tidak ditemukan
                    resultContent.innerHTML = `
                        <span class="text-red-400">[✖] FAILED: ${apiResult.message || 'Player not found.'}</span><br>
                        <span class="text-gray-400">Server ID:</span> ${serverId}<br>
                        <span class="text-gray-400">Region (estimate):</span> <span class="text-pink-400">${region}</span>
                    `;
                }
            } catch (error) {
                resultContent.innerHTML = `<span class="text-red-400">[!] FETCH ERROR: ${error.message}</span>`;
            }
        });
    </script>
</body>
</html>
